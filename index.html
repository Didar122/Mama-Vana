<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mama Vana</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mama Vana">
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000;
            display: flex;
            flex-direction: column;
        }
        #player-container { 
            flex-grow: 1;
            width: 100vw; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        ruffle-player {
            width: 100%;
            height: 100%;
        }

        /* Modern Footer with Centered Text & Animation */
        .footer {
            height: 50px; /* Slightly taller for better centering */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            /* Fixes the "Too high" issue on iPhone */
            padding-bottom: calc(env(safe-area-inset-bottom) / 1.5); 
        }

        .footer p {
            color: rgba(255, 255, 255, 0.5);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            letter-spacing: 0.8px;
            margin: 0;
            display: flex;
            align-items: center;
        }

        /* The Shine Animation */
        .shiny-name {
            color: #fff;
            margin-left: 5px;
            font-weight: bold;
            position: relative;
            display: inline-block;
            background: linear-gradient(90deg, #fff 0%, #666 45%, #fff 50%, #666 55%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <div id="player-container"></div>

    <div class="footer">
        <p>Developed By : <span class="shiny-name">Didar Baxtear</span></p>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("player-container");
            
            container.appendChild(player);

            player.config = {
                letterbox: "on",
                autoPlay: "on",
                unmuteOverlay: "visible",
            };

            player.load({
                url: "game.swf",
                allowScriptAccess: true,
            });
        });
    </script>
</body>
</html>
